<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Print Core</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════
   DESIGN TOKENS — THEMES
══════════════════════════════════════════ */
:root {
  --bg:        #0e0f14;
  --surface:   #16181f;
  --surface2:  #1e2028;
  --surface3:  #272a38;
  --border:    rgba(255,255,255,0.07);
  --border2:   rgba(255,255,255,0.13);
  --text:      #eeedf4;
  --text2:     #8890a8;
  --text3:     #50566e;
  --accent:    #FF4D00;
  --accent2:   #FF8C00;
  --radius-sm: 10px;
  --radius-md: 16px;
  --radius-lg: 22px;
  --topbar-h:  58px;

  /* App grid bg in dark */
  --card-bg:      #1e2028;
  --card-shadow:  0 4px 20px rgba(0,0,0,0.45);
  --card-shadow-h:0 12px 36px rgba(0,0,0,0.6);
  --card-border:  rgba(255,255,255,0.07);
  --icon-zone-bg: rgba(0,0,0,0.25);
  --card-text:    #eeedf4;
  --card-text2:   rgba(255,255,255,0.5);
}

[data-theme="light"] {
  --bg:       #f0eee9;
  --surface:  #ffffff;
  --surface2: #e8e4dc;
  --surface3: #ddd8cf;
  --border:   rgba(0,0,0,0.07);
  --border2:  rgba(0,0,0,0.13);
  --text:     #1a1714;
  --text2:    #6b6560;
  --text3:    #a09890;
  --accent:   #1d4ed8;
  --accent2:  #2563eb;

  --card-bg:      #f8f6f2;
  --card-shadow:  6px 6px 16px rgba(180,170,155,0.45), -4px -4px 12px rgba(255,255,255,0.85);
  --card-shadow-h:8px 8px 24px rgba(160,148,130,0.55), -4px -4px 14px rgba(255,255,255,0.9);
  --card-border:  rgba(255,255,255,0.7);
  --icon-zone-bg: transparent;
  --card-text:    #1c1917;
  --card-text2:   #6b6560;
}

[data-theme="nuit"] {
  --bg:       #030308;
  --surface:  #08071a;
  --surface2: #0f0d28;
  --surface3: #161340;
  --border:   rgba(140,100,255,0.10);
  --border2:  rgba(140,100,255,0.22);
  --text:     #e8e2ff;
  --text2:    #6058a0;
  --text3:    #3a3270;
  --accent:   #a855f7;
  --accent2:  #7c3aed;

  --card-bg:      #0f0d28;
  --card-shadow:  0 4px 24px rgba(0,0,0,0.7);
  --card-shadow-h:0 12px 40px rgba(0,0,0,0.85);
  --card-border:  rgba(140,100,255,0.12);
  --icon-zone-bg: rgba(0,0,0,0.3);
  --card-text:    #e8e2ff;
  --card-text2:   rgba(232,226,255,0.5);
}

/* ══════════════════════════════════════════
   RESET & BASE
══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; width: 100%; overflow: hidden;
  font-family: "Inter", -apple-system, sans-serif;
  background: var(--bg); color: var(--text);
  -webkit-font-smoothing: antialiased;
}

/* ══════════════════════════════════════════
   LAYOUT SHELLS
══════════════════════════════════════════ */
#screen-login {
  position: fixed; inset: 0; z-index: 100;
  display: flex; align-items: center; justify-content: center;
  padding: 1.5rem;
  background: var(--bg);
}
#screen-dash {
  position: fixed; inset: 0; z-index: 90;
  display: none;
  flex-direction: column;
  background: var(--bg);
  overflow: hidden;
}

/* ══════════════════════════════════════════
   AMBIENT BG
══════════════════════════════════════════ */
.ambient {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse 60% 50% at 10% 0%, rgba(255,77,0,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 90% 90%, rgba(255,77,0,0.05) 0%, transparent 60%);
  transition: opacity 0.4s;
}
[data-theme="light"] .ambient {
  background:
    radial-gradient(ellipse 60% 50% at 10% 0%, rgba(29,78,216,0.04) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 90% 90%, rgba(29,78,216,0.03) 0%, transparent 60%);
}
[data-theme="nuit"] .ambient {
  background:
    radial-gradient(ellipse 70% 60% at 10% 5%, rgba(120,60,255,0.18) 0%, transparent 65%),
    radial-gradient(ellipse 50% 40% at 85% 80%, rgba(200,60,255,0.10) 0%, transparent 60%);
}

/* ══════════════════════════════════════════
   LOGIN
══════════════════════════════════════════ */
.login-card {
  position: relative; z-index: 1;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius-lg);
  padding: 2.5rem 2rem 2rem;
  width: 100%; max-width: 400px;
  box-shadow: 0 40px 80px rgba(0,0,0,0.5);
}
.login-card::before {
  content: "";
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,77,0,0.5), transparent);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
}
[data-theme="light"] .login-card::before {
  background: linear-gradient(90deg, transparent, rgba(29,78,216,0.4), transparent);
}
[data-theme="nuit"] .login-card::before {
  background: linear-gradient(90deg, transparent, rgba(168,85,247,0.6), transparent);
}
.login-logo-wrap { text-align: center; margin-bottom: 1.5rem; }
.login-logo-icon {
  width: 72px; height: 72px; border-radius: 20px;
  background: #0a0b0f; border: 1px solid rgba(255,77,0,0.3);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 1rem;
  box-shadow: 0 0 30px rgba(255,77,0,0.15);
}
[data-theme="light"] .login-logo-icon {
  background: #f0ede6; border-color: rgba(29,78,216,0.25);
  box-shadow: 0 0 30px rgba(29,78,216,0.1);
}
[data-theme="light"] .login-logo-icon circle, [data-theme="light"] .login-logo-icon line { stroke: #1d4ed8; }
[data-theme="light"] .login-logo-icon circle:nth-child(2) { fill: #1d4ed8; }
[data-theme="nuit"] .login-logo-icon {
  background: #08071a; border-color: rgba(168,85,247,0.35);
  box-shadow: 0 0 40px rgba(168,85,247,0.2);
}
[data-theme="nuit"] .login-logo-icon circle, [data-theme="nuit"] .login-logo-icon line { stroke: #a855f7; }
[data-theme="nuit"] .login-logo-icon circle:nth-child(2) { fill: #a855f7; }
.login-appname {
  font-size: 26px; font-weight: 900; letter-spacing: -1px;
  color: var(--text);
}
.login-appname span { color: var(--accent); }
[data-theme="nuit"] .login-appname span { color: #a855f7; }
.login-tagline { font-size: 12px; color: var(--text2); margin-top: 3px; letter-spacing: 0.05em; }
.field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 1rem; }
.field-label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; }
.input-wrap { position: relative; }
.input-icon {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  color: var(--text3); pointer-events: none; display: flex;
}
.input-wrap input {
  width: 100%; padding: 11px 12px 11px 38px;
  background: var(--surface2); border: 1.5px solid var(--border2);
  border-radius: var(--radius-sm); font-size: 14px; color: var(--text);
  font-family: inherit; outline: none; transition: border-color 0.2s, box-shadow 0.2s;
}
.input-wrap input::placeholder { color: var(--text3); }
.input-wrap input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(255,77,0,0.15);
}
[data-theme="light"] .input-wrap input:focus { box-shadow: 0 0 0 3px rgba(29,78,216,0.15); }
[data-theme="nuit"] .input-wrap input:focus { border-color: #a855f7; box-shadow: 0 0 0 3px rgba(168,85,247,0.15); }
.pw-eye {
  position: absolute; right: 11px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer; color: var(--text3);
  padding: 2px; display: flex; align-items: center; transition: color 0.15s;
}
.pw-eye:hover { color: var(--text); }
.login-err {
  font-size: 12px; color: #ff6060;
  background: rgba(255,80,80,0.08); border: 1px solid rgba(255,80,80,0.2);
  border-radius: 8px; padding: 7px 12px; margin-bottom: 1rem;
  display: none; text-align: center;
}
.login-err.show { display: block; }
.btn-login {
  width: 100%; padding: 13px;
  background: var(--accent);
  color: #fff; border: none; border-radius: var(--radius-sm);
  font-size: 14px; font-weight: 700; cursor: pointer;
  font-family: inherit; letter-spacing: 0.03em;
  transition: background 0.18s, transform 0.1s, box-shadow 0.18s;
  box-shadow: 0 6px 20px rgba(255,77,0,0.4);
}
.btn-login:hover { background: #cc3d00; box-shadow: 0 8px 28px rgba(255,77,0,0.5); transform: translateY(-1px); }
.btn-login:active { transform: scale(0.98); }
[data-theme="light"] .btn-login { background: #1d4ed8; box-shadow: 0 6px 20px rgba(29,78,216,0.35); }
[data-theme="light"] .btn-login:hover { background: #1a44c0; box-shadow: 0 8px 28px rgba(29,78,216,0.45); }
[data-theme="nuit"] .btn-login { background: linear-gradient(135deg,#7c3aed,#a855f7); box-shadow: 0 6px 24px rgba(124,58,237,0.5); }
[data-theme="nuit"] .btn-login:hover { background: linear-gradient(135deg,#6d28d9,#9333ea); box-shadow: 0 8px 32px rgba(124,58,237,0.65); }
.login-footer { font-size: 11px; color: var(--text3); text-align: center; margin-top: 1.25rem; }

/* ══════════════════════════════════════════
   TOPBAR
══════════════════════════════════════════ */
.topbar {
  height: var(--topbar-h); flex-shrink: 0;
  background: rgba(10,11,15,0.85); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 1.25rem; gap: 8px;
  position: relative; z-index: 50;
}
[data-theme="light"] .topbar { background: rgba(240,238,233,0.92); border-bottom: 1px solid rgba(0,0,0,0.1); }
[data-theme="nuit"] .topbar { background: rgba(3,3,8,0.92); border-bottom-color: rgba(140,100,255,0.15); }
.topbar-brand { display: flex; align-items: center; gap: 9px; flex-shrink: 0; }
.topbar-icon {
  width: 30px; height: 30px; border-radius: 8px;
  background: #0a0b0f; border: 1px solid rgba(255,77,0,0.25);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
[data-theme="light"] .topbar-icon { background: #f0ede6; border-color: rgba(29,78,216,0.2); }
[data-theme="light"] .topbar-icon circle, [data-theme="light"] .topbar-icon line { stroke: #1d4ed8; }
[data-theme="light"] .topbar-icon circle:nth-child(2) { fill: #1d4ed8; }
[data-theme="nuit"] .topbar-icon { background: #08071a; border-color: rgba(168,85,247,0.3); }
[data-theme="nuit"] .topbar-icon circle, [data-theme="nuit"] .topbar-icon line { stroke: #a855f7; }
[data-theme="nuit"] .topbar-icon circle:nth-child(2) { fill: #a855f7; }
.topbar-name {
  font-size: 15px; font-weight: 900; letter-spacing: -0.5px;
  color: var(--text); white-space: nowrap;
}
.topbar-name span { color: var(--accent); }
[data-theme="nuit"] .topbar-name span { color: #a855f7; }
.topbar-sep { flex: 1; }
.back-btn {
  display: none; align-items: center; gap: 6px;
  padding: 6px 12px 6px 9px;
  background: var(--surface2); border: 1.5px solid var(--border2);
  border-radius: 8px; color: var(--text2);
  font-size: 12px; font-weight: 600; cursor: pointer;
  font-family: inherit; transition: all 0.15s; flex-shrink: 0;
}
.back-btn:hover { background: var(--surface3); color: var(--text); }
.back-btn.visible { display: flex; }
[data-theme="nuit"] .back-btn { border-color: rgba(140,100,255,0.25); }
#current-app-name {
  font-size: 13px; font-weight: 700; color: var(--text);
  margin-left: 4px; flex-shrink: 0;
}
.topbar-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.theme-btn {
  display: flex; align-items: center; gap: 5px;
  padding: 6px 11px;
  background: var(--surface2); border: 1.5px solid var(--border2);
  border-radius: 8px; color: var(--text2);
  font-size: 11px; font-weight: 700; cursor: pointer;
  font-family: inherit; transition: all 0.15s;
  letter-spacing: 0.05em; text-transform: uppercase;
}
.theme-btn:hover { background: var(--surface3); color: var(--text); }
[data-theme="nuit"] .theme-btn { border-color: rgba(140,100,255,0.25); }
.theme-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.logout-btn {
  padding: 6px 13px;
  background: none; border: 1.5px solid var(--border2);
  border-radius: 8px; color: var(--text2);
  font-size: 12px; font-weight: 600; cursor: pointer;
  font-family: inherit; transition: all 0.15s;
}
.logout-btn:hover { background: var(--surface2); color: var(--text); }
[data-theme="nuit"] .logout-btn { border-color: rgba(140,100,255,0.25); }
.admin-btn {
  display: none; align-items: center; gap: 5px;
  padding: 6px 12px;
  background: rgba(255,165,0,0.1); border: 1.5px solid rgba(255,165,0,0.25);
  border-radius: 8px; color: #FFA500;
  font-size: 11px; font-weight: 700; cursor: pointer;
  font-family: inherit; transition: all 0.15s; text-transform: uppercase; letter-spacing: 0.05em;
}
.admin-btn:hover { background: rgba(255,165,0,0.18); }
.admin-btn.visible { display: flex; }

/* ══════════════════════════════════════════
   OFFLINE / NOTIF BARS
══════════════════════════════════════════ */
.offline-bar {
  display: none; align-items: center; justify-content: center; gap: 8px;
  padding: 7px 1rem; background: rgba(255,60,60,0.12);
  border-bottom: 1px solid rgba(255,60,60,0.25);
  font-size: 12px; font-weight: 600; color: #ff7070;
  flex-shrink: 0; z-index: 45;
}
.offline-bar.show { display: flex; }
.notif-bar {
  display: none; align-items: center; gap: 10px;
  padding: 9px 1.25rem;
  background: rgba(255,77,0,0.1);
  border-bottom: 1px solid rgba(255,77,0,0.2);
  font-size: 13px; color: var(--text); flex-shrink: 0; z-index: 44;
}
.notif-bar.show { display: flex; }
[data-theme="light"] .notif-bar { background: rgba(29,78,216,0.08); border-bottom-color: rgba(29,78,216,0.18); }
[data-theme="nuit"] .notif-bar { background: rgba(168,85,247,0.1); border-bottom-color: rgba(168,85,247,0.25); }
.notif-text { flex: 1; }
.notif-close {
  background: none; border: none; color: var(--text3);
  cursor: pointer; font-size: 16px; padding: 0 4px;
}
.notif-admin-edit {
  font-size: 11px; padding: 3px 9px;
  background: rgba(255,77,0,0.15); border: 1px solid rgba(255,77,0,0.3);
  border-radius: 6px; color: var(--accent); cursor: pointer;
  font-family: inherit; font-weight: 700;
}
[data-theme="light"] .notif-admin-edit { background: rgba(29,78,216,0.1); border-color: rgba(29,78,216,0.25); color: #1d4ed8; }

/* ══════════════════════════════════════════
   APP ZONE
══════════════════════════════════════════ */
.app-zone {
  flex: 1; position: relative;
  overflow: hidden; min-height: 0;
}
#home-panel {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  overflow-y: auto; overflow-x: hidden;
  padding: 1.75rem 1.5rem 3rem;
  -webkit-overflow-scrolling: touch;
}
#app-iframe-panel {
  display: none; position: absolute; inset: 0; z-index: 10;
}
#app-iframe {
  width: 100%; height: 100%; border: none; background: #fff;
}

/* ══════════════════════════════════════════
   HOME DASHBOARD
══════════════════════════════════════════ */
.welcome-block { margin-bottom: 1.75rem; }
.welcome-block h2 {
  font-size: 28px; font-weight: 900; letter-spacing: -0.8px;
  color: var(--text); line-height: 1.1;
}
.welcome-block h2 span { color: var(--accent); }
.welcome-block p { font-size: 13px; color: var(--text2); margin-top: 4px; }

/* FAVS */
.favs-section { margin-bottom: 1.5rem; }
.section-label {
  font-size: 10px; font-weight: 700; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px;
}
.favs-row { display: flex; gap: 8px; flex-wrap: wrap; }
.fav-chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 13px 6px 9px;
  border-radius: 20px; cursor: pointer;
  font-size: 12px; font-weight: 700;
  border: 1.5px solid; transition: all 0.15s;
  white-space: nowrap;
}
.fav-chip:hover { transform: translateY(-1px); }

/* ══════════════════════════════════════════
   APP GRID — NOUVEAU DESIGN NEUMORPHIQUE
══════════════════════════════════════════ */
.apps-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 18px;
}

/* Carte principale */
.app-card {
  position: relative; overflow: hidden;
  border-radius: 20px;
  background: var(--card-bg);
  box-shadow: var(--card-shadow);
  border: 1px solid var(--card-border);
  cursor: pointer;
  display: flex; flex-direction: column;
  align-items: stretch; text-align: center;
  min-height: 190px;
  transition: transform 0.22s cubic-bezier(.34,1.56,.64,1), box-shadow 0.22s ease;
  font-family: inherit;
  /* Pas de couleur de fond global sur la carte */
}
.app-card:hover {
  transform: translateY(-6px) scale(1.025);
  box-shadow: var(--card-shadow-h);
}
.app-card:active { transform: scale(0.97); }

/* Étoile favori */
.fav-star {
  position: absolute; top: 9px; right: 9px; z-index: 5;
  background: rgba(0,0,0,0.18); border: none; cursor: pointer;
  color: rgba(255,255,255,0.7); padding: 4px 6px;
  font-size: 13px; border-radius: 7px;
  opacity: 0; transition: all 0.15s;
}
[data-theme="light"] .fav-star { background: rgba(0,0,0,0.08); color: rgba(0,0,0,0.4); }
.app-card:hover .fav-star { opacity: 1; }
.fav-star.active { opacity: 1 !important; color: #FFD700; background: rgba(0,0,0,0.28); }

/* Zone icône — pavé coloré plein */
.app-icon-zone {
  display: flex; align-items: center; justify-content: center;
  padding: 1.5rem 1rem 1.2rem;
  flex: 1;
  position: relative; z-index: 2;
}

/* Pavé icône coloré — rond doux */
.app-icon-wrap {
  width: 76px; height: 76px;
  border-radius: 22px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 6px 18px rgba(0,0,0,0.25);
  transition: box-shadow 0.2s, transform 0.2s;
}
.app-card:hover .app-icon-wrap {
  transform: scale(1.06);
  box-shadow: 0 10px 28px rgba(0,0,0,0.35);
}

/* Palette harmonieuse — couleurs vives mais cohérentes */
/* Bleu cobalt */
.ai-1 { background: #2563EB; }
/* Vert forêt */
.ai-2 { background: #16A34A; }
/* Ambre brûlé */
.ai-3 { background: #D97706; }
/* Teal profond */
.ai-4 { background: #0891B2; }
/* Rouge brique */
.ai-5 { background: #DC2626; }
/* Prune */
.ai-6 { background: #7C3AED; }
/* Vert émeraude */
.ai-de { background: #059669; }
/* Bleu acier */
.ai-bat { background: #0369A1; }
/* Ardoise */
.ai-st { background: #475569; }
/* Rose indien */
.ai-extra { background: #DB2777; }

/* Zone texte — bande basse */
.app-text-zone {
  padding: 0.75rem 0.85rem 0.9rem;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  position: relative; z-index: 2;
  border-top: 1px solid var(--card-border);
}
.app-name {
  font-size: 13px; font-weight: 800; color: var(--card-text);
  line-height: 1.2; letter-spacing: -0.2px;
}
.app-desc {
  font-size: 10.5px; color: var(--card-text2);
  line-height: 1.3;
}
.badge-new {
  font-size: 9px; font-weight: 800; padding: 2px 8px;
  background: rgba(255,215,0,0.18); color: #D97706;
  border-radius: 20px; text-transform: uppercase;
  letter-spacing: 0.08em; border: 1px solid rgba(217,119,6,0.35);
  margin-bottom: 2px;
}
[data-theme="dark"] .badge-new, [data-theme="nuit"] .badge-new {
  background: rgba(255,215,0,0.12); color: #FFD700;
  border-color: rgba(255,215,0,0.3);
}

/* ══════════════════════════════════════════
   ADMIN PANEL
══════════════════════════════════════════ */
#admin-panel {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.75); backdrop-filter: blur(8px);
  align-items: center; justify-content: center; padding: 1.5rem;
}
#admin-panel.show { display: flex; }
.admin-card {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: var(--radius-lg); padding: 2rem 1.75rem;
  width: 100%; max-width: 500px;
  box-shadow: 0 24px 60px rgba(0,0,0,0.5);
  max-height: 90vh; overflow-y: auto;
}
.admin-title { font-size: 16px; font-weight: 800; color: var(--text); margin-bottom: 1.5rem; }
.admin-section { margin-bottom: 1.5rem; }
.admin-label { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; display: block; }
.admin-input {
  width: 100%; padding: 9px 12px;
  background: var(--surface2); border: 1.5px solid var(--border2);
  border-radius: 8px; color: var(--text);
  font-family: inherit; font-size: 13px; outline: none;
}
.admin-input:focus { border-color: var(--accent); }
.admin-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.admin-row {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 10px; border-radius: 8px;
  background: var(--surface2); font-size: 12px; color: var(--text);
  border: 1px solid var(--border);
}
.admin-row input { accent-color: var(--accent); }
.admin-save {
  width: 100%; padding: 11px;
  background: var(--accent); color: #fff; border: none;
  border-radius: 9px; font-size: 13px; font-weight: 700;
  cursor: pointer; font-family: inherit;
}
.admin-save:hover { opacity: 0.9; }
[data-theme="light"] .admin-save { background: #1d4ed8; }
[data-theme="light"] .admin-save:hover { background: #1a44c0; }
[data-theme="nuit"] .admin-save { background: #7c3aed; }
[data-theme="nuit"] .admin-save:hover { background: #6d28d9; }
.admin-close-btn {
  display: block; width: 100%; margin-top: 8px; padding: 9px;
  background: none; border: 1.5px solid var(--border2);
  border-radius: 9px; font-size: 13px; font-weight: 600;
  color: var(--text2); cursor: pointer; font-family: inherit;
}
.admin-close-btn:hover { background: var(--surface2); color: var(--text); }

/* ══════════════════════════════════════════
   DEMO PREVIEW (pour tester sans backend)
══════════════════════════════════════════ */
</style>
</head>
<body>

<div class="ambient"></div>

<!-- ═══════════════ LOGIN ═══════════════ -->
<div id="screen-login">
  <div class="login-card">
    <div class="login-logo-wrap">
      <div class="login-logo-icon">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="18" cy="18" r="14" stroke="#FF4D00" stroke-width="2" fill="none"/>
          <circle cx="18" cy="18" r="5" fill="#FF4D00"/>
          <line x1="18" y1="4" x2="18" y2="10" stroke="#FF4D00" stroke-width="2" stroke-linecap="round"/>
          <line x1="18" y1="26" x2="18" y2="32" stroke="#FF4D00" stroke-width="2" stroke-linecap="round"/>
          <line x1="4" y1="18" x2="10" y2="18" stroke="#FF4D00" stroke-width="2" stroke-linecap="round"/>
          <line x1="26" y1="18" x2="32" y2="18" stroke="#FF4D00" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="login-appname">Print<span>Core</span></div>
      <div class="login-tagline">LuxVisual · Production Suite</div>
    </div>
    <div class="field">
      <div class="field-label">Identifiant</div>
      <div class="input-wrap">
        <span class="input-icon">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </span>
        <input type="text" id="login-user" placeholder="Votre identifiant" autocomplete="username">
      </div>
    </div>
    <div class="field">
      <div class="field-label">Mot de passe</div>
      <div class="input-wrap">
        <span class="input-icon">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </span>
        <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">
        <button class="pw-eye" id="pw-toggle" tabindex="-1" aria-label="Voir/Masquer">
          <svg id="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>
    <div class="login-err" id="login-err">Identifiant ou mot de passe incorrect.</div>
    <button class="btn-login" id="btn-login">Se connecter</button>
    <div class="login-footer">LuxVisual · Système interne · v2.1</div>
  </div>
</div>

<!-- ═══════════════ DASHBOARD ═══════════════ -->
<div id="screen-dash">
  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-brand">
      <div class="topbar-icon">
        <svg width="16" height="16" viewBox="0 0 36 36" fill="none">
          <circle cx="18" cy="18" r="14" stroke="#FF4D00" stroke-width="2" fill="none"/>
          <circle cx="18" cy="18" r="5" fill="#FF4D00"/>
          <line x1="18" y1="4" x2="18" y2="10" stroke="#FF4D00" stroke-width="2" stroke-linecap="round"/>
          <line x1="18" y1="26" x2="18" y2="32" stroke="#FF4D00" stroke-width="2" stroke-linecap="round"/>
          <line x1="4" y1="18" x2="10" y2="18" stroke="#FF4D00" stroke-width="2" stroke-linecap="round"/>
          <line x1="26" y1="18" x2="32" y2="18" stroke="#FF4D00" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="topbar-name">Print<span>Core</span></div>
    </div>

    <button class="back-btn" id="back-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      Accueil
    </button>
    <span id="current-app-name"></span>

    <div class="topbar-sep"></div>
    <div class="topbar-right">
      <button class="admin-btn" id="admin-btn">⚙ Admin</button>
      <button class="theme-btn" id="theme-btn">
        <span class="theme-dot" id="theme-dot" style="background:#888"></span>
        <span id="theme-label">Thème</span>
      </button>
      <button class="logout-btn" id="logout-btn">Déco.</button>
    </div>
  </div>

  <!-- Offline bar -->
  <div class="offline-bar" id="offline-bar">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 1l22 22"/><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/><path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/><path d="M10.71 5.05A16 16 0 0 1 22.56 9"/><path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>
    Mode hors-ligne
  </div>

  <!-- Notif bar -->
  <div class="notif-bar" id="notif-bar">
    <span class="notif-text" id="notif-text"></span>
    <button class="notif-admin-edit" id="notif-admin-edit">Modifier</button>
    <button class="notif-close" id="notif-close">×</button>
  </div>

  <!-- App zone -->
  <div class="app-zone">
    <div id="home-panel">
      <div class="welcome-block">
        <h2>Bonjour, <span id="user-display-name">—</span> 👋</h2>
        <p id="welcome-sub">Choisissez une application pour commencer.</p>
      </div>

      <!-- Favoris -->
      <div class="favs-section" id="favs-section" style="display:none">
        <div class="section-label">⭐ Favoris</div>
        <div class="favs-row" id="favs-row"></div>
      </div>

      <!-- Section apps -->
      <div class="section-label" id="apps-label">Applications</div>
      <div class="apps-grid" id="apps-grid">
        <!-- Cards générées par JS -->
      </div>
    </div>

    <div id="app-iframe-panel">
      <iframe id="app-iframe" title="Application"></iframe>
    </div>
  </div>
</div>

<!-- ═══════════════ ADMIN PANEL ═══════════════ -->
<div id="admin-panel">
  <div class="admin-card">
    <div class="admin-title">⚙️ Administration</div>

    <div class="admin-section">
      <label class="admin-label">Message de notification</label>
      <input type="text" class="admin-input" id="admin-notif" placeholder="Message affiché en haut du dashboard…">
    </div>

    <div class="admin-section">
      <label class="admin-label">Applications activées</label>
      <div id="admin-apps-list"></div>
    </div>

    <button class="admin-save" id="admin-save">Enregistrer</button>
    <button class="admin-close-btn" id="admin-close">Fermer</button>
  </div>
</div>

<script>
/* ══════════════════════════════════════════
   CONFIG — UTILISATEURS & APPS
══════════════════════════════════════════ */
const USERS = [
  { id: "paul",    pass: "lux2024",  name: "Paul",    admin: true  },
  { id: "sophie",  pass: "lux2024",  name: "Sophie",  admin: false },
  { id: "marco",   pass: "lux2024",  name: "Marco",   admin: false },
];

// Palette harmonieuse : classe .ai-X associée à chaque app
const APPS_DEF = [
  { id:"plateID",    name:"Plate ID",      desc:"Gestion plaques",      icon:"plateID",   color:"ai-1", url:"plate-id.html",      roles:["all"] },
  { id:"ncPAO",      name:"NC · PAO",      desc:"Non-conformités",      icon:"nc",        color:"ai-5", url:"nc-pao-v5.html",      roles:["all"] },
  { id:"devis",      name:"Devis",         desc:"Estimation & tarifs",  icon:"devis",     color:"ai-de",url:"devis.html",          roles:["all"] },
  { id:"chassis",    name:"Châssis Alu",   desc:"Calculateur cadres",   icon:"chassis",   color:"ai-3", url:"chassis.html",        roles:["all"] },
  { id:"planning",   name:"Planning",      desc:"Calendrier machine",   icon:"planning",  color:"ai-4", url:"planning.html",       roles:["all"] },
  { id:"stock",      name:"Stock",         desc:"Matières premières",   icon:"stock",     color:"ai-2", url:"stock.html",          roles:["all"] },
  { id:"stats",      name:"Statistiques",  desc:"Tableaux de bord",     icon:"stats",     color:"ai-st",url:"stats.html",          roles:["all"], badge:"New" },
  { id:"bat",        name:"BAT",           desc:"Bon à tirer",          icon:"bat",       color:"ai-bat",url:"bat.html",           roles:["all"] },
  { id:"collab",     name:"Collab",        desc:"Partage équipe",       icon:"collab",    color:"ai-6", url:"collab.html",         roles:["all"] },
];

/* ══════════════════════════════════════════
   SVG ICONS — inline par app
══════════════════════════════════════════ */
function getIcon(key, size=36) {
  const s = size, c = "none", w = "currentColor";
  const icons = {
    plateID: `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="${c}" stroke="${w}" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M7 8h10M7 12h7M7 16h4"/></svg>`,
    nc: `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="${c}" stroke="${w}" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
    devis: `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="${c}" stroke="${w}" stroke-width="1.8"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>`,
    chassis: `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="${c}" stroke="${w}" stroke-width="1.8"><rect x="2" y="2" width="20" height="20" rx="2"/><rect x="6" y="6" width="12" height="12" rx="1"/></svg>`,
    planning: `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="${c}" stroke="${w}" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`,
    stock: `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="${c}" stroke="${w}" stroke-width="1.8"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>`,
    stats: `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="${c}" stroke="${w}" stroke-width="1.8"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>`,
    bat: `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="${c}" stroke="${w}" stroke-width="1.8"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>`,
    collab: `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="${c}" stroke="${w}" stroke-width="1.8"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`,
  };
  return icons[key] || icons.plateID;
}

/* ══════════════════════════════════════════
   STATE
══════════════════════════════════════════ */
let currentUser = null;
let favs = JSON.parse(localStorage.getItem("pc_favs") || "[]");
let hiddenApps = JSON.parse(localStorage.getItem("pc_hidden") || "[]");
let notifMsg = localStorage.getItem("pc_notif") || "";
const THEMES = ["dark","light","nuit"];
let themeIdx = THEMES.indexOf(localStorage.getItem("pc_theme") || "dark");
if (themeIdx < 0) themeIdx = 0;

/* ══════════════════════════════════════════
   THEME
══════════════════════════════════════════ */
function applyTheme(idx) {
  const t = THEMES[idx];
  document.documentElement.setAttribute("data-theme", t);
  const dot = document.getElementById("theme-dot");
  const lbl = document.getElementById("theme-label");
  if (t === "dark")  { dot.style.background="#555"; lbl.textContent="Sombre"; }
  if (t === "light") { dot.style.background="#d4c8b0"; lbl.textContent="Clair"; }
  if (t === "nuit")  { dot.style.background="#a855f7"; lbl.textContent="Nuit"; }
  localStorage.setItem("pc_theme", t);
}
applyTheme(themeIdx);

/* ══════════════════════════════════════════
   LOGIN
══════════════════════════════════════════ */
document.getElementById("btn-login").addEventListener("click", tryLogin);
document.getElementById("login-pass").addEventListener("keydown", e => { if (e.key === "Enter") tryLogin(); });
document.getElementById("pw-toggle").addEventListener("click", () => {
  const inp = document.getElementById("login-pass");
  inp.type = inp.type === "password" ? "text" : "password";
});

function tryLogin() {
  const u = document.getElementById("login-user").value.trim().toLowerCase();
  const p = document.getElementById("login-pass").value;
  const found = USERS.find(x => x.id === u && x.pass === p);
  if (!found) {
    document.getElementById("login-err").classList.add("show");
    return;
  }
  currentUser = found;
  document.getElementById("login-err").classList.remove("show");
  showDash();
}

/* ══════════════════════════════════════════
   DASHBOARD
══════════════════════════════════════════ */
function showDash() {
  document.getElementById("screen-login").style.display = "none";
  const dash = document.getElementById("screen-dash");
  dash.style.display = "flex";

  document.getElementById("user-display-name").textContent = currentUser.name;

  // Admin btn
  const adminBtn = document.getElementById("admin-btn");
  if (currentUser.admin) adminBtn.classList.add("visible");

  // Notif
  if (notifMsg) showNotif(notifMsg);

  // Render apps
  renderApps();
  renderFavs();

  // Offline
  window.addEventListener("online",  () => document.getElementById("offline-bar").classList.remove("show"));
  window.addEventListener("offline", () => document.getElementById("offline-bar").classList.add("show"));
  if (!navigator.onLine) document.getElementById("offline-bar").classList.add("show");
}

function renderApps() {
  const grid = document.getElementById("apps-grid");
  grid.innerHTML = "";
  const visible = APPS_DEF.filter(a => !hiddenApps.includes(a.id));
  visible.forEach(app => {
    const card = document.createElement("button");
    card.className = "app-card";
    card.dataset.appId = app.id;

    const isFav = favs.includes(app.id);
    card.innerHTML = `
      <button class="fav-star${isFav ? " active" : ""}" data-fav="${app.id}" title="Favori">★</button>
      <div class="app-icon-zone">
        <div class="app-icon-wrap ${app.color}" style="color:#fff">
          ${getIcon(app.icon, 34)}
        </div>
      </div>
      <div class="app-text-zone">
        ${app.badge ? `<div class="badge-new">${app.badge}</div>` : ""}
        <div class="app-name">${app.name}</div>
        <div class="app-desc">${app.desc}</div>
      </div>
    `;

    card.querySelector(".fav-star").addEventListener("click", e => {
      e.stopPropagation();
      toggleFav(app.id);
    });
    card.addEventListener("click", () => openApp(app));
    grid.appendChild(card);
  });
}

function renderFavs() {
  const sec = document.getElementById("favs-section");
  const row = document.getElementById("favs-row");
  if (!favs.length) { sec.style.display = "none"; return; }
  sec.style.display = "block";
  row.innerHTML = "";
  favs.forEach(id => {
    const app = APPS_DEF.find(a => a.id === id);
    if (!app) return;
    const chip = document.createElement("button");
    chip.className = "fav-chip";
    // Couleur chip basée sur la couleur de l'app
    const colorMap = { "ai-1":"#2563EB","ai-2":"#16A34A","ai-3":"#D97706","ai-4":"#0891B2","ai-5":"#DC2626","ai-6":"#7C3AED","ai-de":"#059669","ai-bat":"#0369A1","ai-st":"#475569" };
    const col = colorMap[app.color] || "#555";
    chip.style.borderColor = col + "55";
    chip.style.background = col + "18";
    chip.style.color = col;
    chip.innerHTML = `${getIcon(app.icon, 13)} ${app.name}`;
    chip.addEventListener("click", () => openApp(app));
    row.appendChild(chip);
  });
}

function toggleFav(id) {
  if (favs.includes(id)) {
    favs = favs.filter(f => f !== id);
  } else {
    favs.push(id);
  }
  localStorage.setItem("pc_favs", JSON.stringify(favs));
  renderApps();
  renderFavs();
}

function openApp(app) {
  document.getElementById("home-panel").style.display = "none";
  const panel = document.getElementById("app-iframe-panel");
  panel.style.display = "block";
  document.getElementById("app-iframe").src = app.url;
  document.getElementById("back-btn").classList.add("visible");
  document.getElementById("current-app-name").textContent = app.name;
}

/* ══════════════════════════════════════════
   BACK / LOGOUT / THEME / ADMIN
══════════════════════════════════════════ */
document.getElementById("back-btn").addEventListener("click", () => {
  document.getElementById("app-iframe-panel").style.display = "none";
  document.getElementById("app-iframe").src = "";
  document.getElementById("home-panel").style.display = "flex";
  document.getElementById("back-btn").classList.remove("visible");
  document.getElementById("current-app-name").textContent = "";
});

document.getElementById("logout-btn").addEventListener("click", () => {
  currentUser = null;
  document.getElementById("screen-dash").style.display = "none";
  document.getElementById("screen-login").style.display = "flex";
  document.getElementById("login-user").value = "";
  document.getElementById("login-pass").value = "";
});

document.getElementById("theme-btn").addEventListener("click", () => {
  themeIdx = (themeIdx + 1) % THEMES.length;
  applyTheme(themeIdx);
});

/* NOTIF */
function showNotif(msg) {
  const bar = document.getElementById("notif-bar");
  document.getElementById("notif-text").textContent = msg;
  bar.classList.add("show");
}
document.getElementById("notif-close").addEventListener("click", () => {
  document.getElementById("notif-bar").classList.remove("show");
});
document.getElementById("notif-admin-edit").addEventListener("click", () => {
  if (currentUser?.admin) openAdmin();
});

/* ADMIN */
document.getElementById("admin-btn").addEventListener("click", openAdmin);
document.getElementById("admin-close").addEventListener("click", () => {
  document.getElementById("admin-panel").classList.remove("show");
});

function openAdmin() {
  document.getElementById("admin-notif").value = notifMsg;
  // Build app toggles
  const list = document.getElementById("admin-apps-list");
  list.innerHTML = "";
  APPS_DEF.forEach(app => {
    const row = document.createElement("div");
    row.className = "admin-row";
    const chk = document.createElement("input");
    chk.type = "checkbox";
    chk.id = "adm_" + app.id;
    chk.checked = !hiddenApps.includes(app.id);
    const lbl = document.createElement("label");
    lbl.htmlFor = "adm_" + app.id;
    lbl.textContent = app.name;
    lbl.style.flex = "1";
    row.appendChild(chk);
    row.appendChild(lbl);
    list.appendChild(row);
  });
  document.getElementById("admin-panel").classList.add("show");
}

document.getElementById("admin-save").addEventListener("click", () => {
  notifMsg = document.getElementById("admin-notif").value.trim();
  localStorage.setItem("pc_notif", notifMsg);
  hiddenApps = [];
  APPS_DEF.forEach(app => {
    const chk = document.getElementById("adm_" + app.id);
    if (chk && !chk.checked) hiddenApps.push(app.id);
  });
  localStorage.setItem("pc_hidden", JSON.stringify(hiddenApps));
  document.getElementById("admin-panel").classList.remove("show");
  if (notifMsg) showNotif(notifMsg);
  else document.getElementById("notif-bar").classList.remove("show");
  renderApps();
  renderFavs();
});
</script>
</body>
</html>
